function WCLogo({ size = 32 }) {
  return <img src={size > 60 ? LOGO_LG : LOGO_SM} alt="WildCoders" style={{ width: size, height: size, objectFit: "contain", borderRadius: size > 40 ? 6 : 3 }} />;
}

function Section({ children, bg, id }) {
  return (
    <section id={id} style={{ padding: "64px 24px", background: bg || "transparent", display: "flex", justifyContent: "center" }}>
      <div style={{ maxWidth: 1080, width: "100%" }}>{children}</div>
    </section>
  );
}

function FAQ({ q, a }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "16px 0" }}>
      <button onClick={() => setOpen(!open)} style={{ background: "none", border: "none", color: "#fff", fontSize: 16, fontWeight: 600, fontFamily: "inherit", cursor: "pointer", width: "100%", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center", padding: 0, lineHeight: 1.4 }}>
        <span style={{ paddingRight: 20 }}>{q}</span>
        <span style={{ fontSize: 20, opacity: 0.2, transform: open ? "rotate(45deg)" : "none", transition: "transform 0.2s", flexShrink: 0 }}>+</span>
      </button>
      {open && <div style={{ fontSize: 15, opacity: 0.5, lineHeight: 1.7, marginTop: 10, paddingRight: 30 }}>{a}</div>}
    </div>
  );
}
