if (!window.storage) {
  window.storage = {
    async get(key) {
      try {
        const val = localStorage.getItem("wc_" + key);
        if (val === null) throw new Error("not found");
        return { key, value: val };
      } catch(e) { throw e; }
    },
    async set(key, value) {
      try {
        localStorage.setItem("wc_" + key, value);
        return { key, value };
      } catch(e) { return null; }
    },
    async delete(key) {
      localStorage.removeItem("wc_" + key);
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith("wc_" + (prefix || ""))) keys.push(k.replace("wc_", ""));
      }
      return { keys };
    }
  };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const BS = (g,sh) => ({background:g,color:"#fff",padding:"14px 32px",borderRadius:50,fontSize:17,fontWeight:700,fontFamily:"inherit",border:"none",boxShadow:sh||"none",cursor:"pointer",transition:"all 0.15s"});

// ===== MAIN GAME =====
function App() {
  const [scr, setScr] = useState("welcome");
  const [onb, setOnb] = useState(0);
  const [nm, setNm] = useState("");
  const [age, setAge] = useState(0);
  const [gender, setGender] = useState("");
  const [prof, setProf] = useState(null);
  const [wI, setWI] = useState(0);
  const [qI, setQI] = useState(0);
  const [powers, setPowers] = useState([]);
  const [prizes, setPrizes] = useState([null,null,null,null,null]);
  const [wS, setWS] = useState(0);
  const [totC, setTotC] = useState(0);
  const [sel, setSel] = useState(null);
  const [sR, setSR] = useState(false);
  const [sPath, setSPath] = useState(false);
  const [sH, setSH] = useState(false);
  const [bHP, setBHP] = useState(10);
  const [pHP, setPHP] = useState(10);
  const [bQI, setBQI] = useState(0);
  const [gO, setGO] = useState(null);
  const [sPr, setSPr] = useState(null);
  const [sp, setSp] = useState("");
  const [shSp, setShSp] = useState(false);
  const [secQ, setSecQ] = useState(false);
  const [secD, setSecD] = useState(false);
  const [wQs, setWQs] = useState(() => QS.map(pool => shuffle(pool).slice(0,4)));
  const [bQs, setBQs] = useState(() => shuffle(BOSS_QS).slice(0,10));
  const [skills, setSkills] = useState({critical:0,nature:0,survival:0,vibe:0,grit:0});
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [scorePop, setScorePop] = useState("");
  const [hiS, setHiS] = useState([]);
  const [usedHint, setUsedHint] = useState(false);
  const [skillLog, setSkillLog] = useState([]);
  const tmr = useRef(null);
  const popTmr = useRef(null);

  useEffect(() => {
    let m = true;
    (async () => { try { const r = await window.storage.get("wq-v7-lb"); if (r && m) setHiS(JSON.parse(r.value)); } catch(e){} })();
    return () => { m = false; if (tmr.current) clearTimeout(tmr.current); if (popTmr.current) clearTimeout(popTmr.current); };
  }, []);

  const say = (cat) => {
    const ws = {start:["Let's go!","Ready!"],correct:["Yes!","Nailed it!","Awesome!"],wrong:["Tricky!","Next one!"],power:["POWER UP!"],boss:["Bring it!"],bosshit:["Take that!","Hit!"],bossmiss:["Ow!","Ouch!"],win:["WOOHOO!","CHAMPION!"]};
    setSp(pick(ws[cat]||["..."])); setShSp(true);
    if (tmr.current) clearTimeout(tmr.current);
    tmr.current = setTimeout(() => setShSp(false), 1500);
  };

  const addSk = (id, pts=1) => {
    setSkills(s => ({...s,[id]:(s[id]||0)+pts}));
    const sk = SKILL_MAP[id];
    if (sk) setSkillLog(l => [...l, {sk: sk.nm, em: sk.em, pts}]);
  };

  const addScore = (pts, label) => {
    const mult = prof ? prof.ptsMult : 1;
    const total = Math.round(pts * mult);
    setScore(s => s + total);
    setScorePop(`+${total} ${label || ""}`);
    if (popTmr.current) clearTimeout(popTmr.current);
    popTmr.current = setTimeout(() => setScorePop(""), 1200);
  };

  const getRank = (s) => {
    const all = [...hiS, {score: s}].sort((a,b) => b.score - a.score);
    return all.findIndex(x => x.score === s) + 1;
  };

  const topScore = hiS.length > 0 ? hiS[0].score : 0;

  const w = WORLDS[wI] || WORLDS[0];
  const p = prof || getProfile(8);
  const nQ = p.numQ;
  const aQ = secQ ? SECRET_QS[wI] : (wQs[wI] ? wQs[wI][qI] : null);
  const cBQ = bQs[bQI] || null;
  const totSk = Object.values(skills).reduce((a2,b) => a2+b, 0);

  const start = () => { const pr = getProfile(age); setProf(pr); setBHP(pr.bossHP); setPHP(pr.playerHP); setScr("map"); say("start"); };

  const reset = () => {
    setWQs(QS.map(pool => shuffle(pool).slice(0,4))); setBQs(shuffle(BOSS_QS).slice(0,10));
    setScr("welcome"); setOnb(0); setWI(0); setQI(0); setPowers([]); setPrizes([null,null,null,null,null]);
    setWS(0); setTotC(0); setSel(null); setSR(false); setSPath(false); setSH(false);
    setBHP(10); setPHP(10); setBQI(0); setGO(null); setSPr(null);
    setSecQ(false); setSecD(false); setSkills({critical:0,nature:0,survival:0,vibe:0,grit:0});
    setScore(0); setStreak(0); setSkillLog([]); setUsedHint(false);
  };

  const ans = (idx) => {
    if (sR || !aQ) return;
    setSel(idx); setSR(true);
    if (idx === aQ.a) {
      if (!secQ) setWS(s => s+1);
      setTotC(t => t+1);
      say("correct");
      addSk(aQ.sk || "nature");
      const streakBonus = streak * PTS.streak;
      const hintBonus = usedHint ? 0 : PTS.noHint;
      const base = secQ ? PTS.bonus : PTS.correct;
      addScore(base + streakBonus + hintBonus, secQ ? "Bonus!" : "");
      setStreak(s => s+1);
    } else {
      say("wrong"); addSk("grit"); setStreak(0);
    }
    setUsedHint(false);
  };

  const nxt = () => {
    setSel(null); setSR(false); setSH(false);
    if (secQ) { setSecD(true); setSecQ(false); setScr("worldDone"); return; }
    if (qI < nQ-1) { setSPath(true); tmr.current = setTimeout(() => { setSPath(false); setQI(q => q+1); }, 1400); }
    else {
      const np = [...powers]; if (wS>=2) { np.push(wI); say("power"); addSk("nature",2); addScore(PTS.power, "Power!"); } setPowers(np);
      if (wS>=3 && !secD) { setSecQ(true); setSR(false); setSel(null); setSH(false); }
      else setScr("worldDone");
    }
  };

  const bAns = (idx) => {
    if (sR || !cBQ) return;
    setSel(idx); setSR(true);
    if (idx === cBQ.a) {
      const dbl = cBQ.pw>=0 && powers.includes(cBQ.pw);
      const d = dbl ? 2 : 1;
      setBHP(h => Math.max(0,h-d));
      setTotC(t => t+1);
      say("bosshit");
      addSk("critical");
      addScore(dbl ? PTS.bossDouble : PTS.bossHit, dbl ? "DOUBLE!" : "");
      setStreak(s => s+1);
    } else {
      setPHP(h => Math.max(0,h-1)); say("bossmiss"); addSk("grit"); setStreak(0);
    }
  };

  const nBQ = () => {
    if (bHP<=0) {
      setGO("win"); say("win"); addSk("vibe",3);
      const finalScore = score;
      (async () => { try { const ns = [...hiS, {name:nm,score:finalScore,age,date:new Date().toLocaleDateString()}].sort((a2,b2) => b2.score-a2.score).slice(0,10); setHiS(ns); await window.storage.set("wq-v7-lb",JSON.stringify(ns)); } catch(e){} })();
      return;
    }
    if (pHP<=0) { setGO("lose"); return; }
    setSel(null); setSR(false);
    if (bQI < bQs.length-1) setBQI(q => q+1); else setGO(bHP<=pHP?"win":"lose");
  };

  const bg = (scr==="boss"||scr==="preBoss") ? "linear-gradient(180deg,#0a0015,#1a0a2e 30%,#5a2a8e)" : scr==="welcome"||scr==="leaderboard" ? "linear-gradient(180deg,#0b1628,#152238 40%,#253d5f)" : scr==="map" ? "linear-gradient(180deg,#0d1520,#1a2a3a 40%,#2a3a4a)" : w.bg;

  return (
    <div style={{minHeight:"100vh",background:bg,color:"#fff",fontFamily:"'Fredoka',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",padding:"16px 20px",transition:"background 0.8s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        @keyframes fp{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-18px) rotate(8deg)}}
        @keyframes bi{0%{transform:scale(0);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
        @keyframes su{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
        @keyframes gw{0%,100%{box-shadow:0 0 5px rgba(255,255,255,0.12)}50%{box-shadow:0 0 20px rgba(255,255,255,0.35)}}
        @keyframes pd{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
        @keyframes vb{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        @keyframes charIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes bossIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

          <Hero powers={powers} prizes={prizes} size={85} animate speech="Bring it!" showSp gender={gender}/>
          <div style={{display:"flex",gap:4,justifyContent:"center",margin:"6px 0",flexWrap:"wrap"}}>
            {WORLDS.map((w2,i)=>(<span key={i} style={{fontSize:10,opacity:powers.includes(i)?1:0.2,background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"3px 8px",fontWeight:600}}>{w2.pw.em} {powers.includes(i)?w2.pw.nm:"?"}</span>))}
          </div>
          <button className="cb" onClick={()=>setScr("boss")} style={{...BS("linear-gradient(135deg,#9333ea,#dc2626)","0 4px 16px rgba(147,51,234,0.3)"),animation:"gw 2s ease-in-out infinite"}}>FIGHT!</button>
        </div>
      )}

      {/* BOSS */}
      {scr==="boss" && !gO && cBQ && (
        <div style={{maxWidth:500,width:"100%",zIndex:1,position:"relative"}}>
          <Particles items={["🔥","💀","⚡","💥"]}/>
          <LiveScore score={score} hiScore={topScore} rank={getRank(score)}/>
          <ScorePopup text={scorePop} color="#ffd700"/>
          <HPBar cur={bHP} max={p.bossHP} label="Biome Boss" color="#dc2626"/>
          <HPBar cur={pHP} max={p.playerHP} label={nm} color="#4ade80"/>
          <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",margin:"10px 0",minHeight:110}}>
            <Hero powers={powers} prizes={prizes} size={65} animate speech={sp} showSp={shSp} gender={gender}/>
            <div style={{fontSize:22,fontWeight:900,opacity:0.2}}>VS</div>
            <BossSVG hp={bHP} maxHp={p.bossHP}/>
          </div>
          {cBQ.pw>=0&&powers.includes(cBQ.pw)&&<div style={{textAlign:"center",fontSize:11,color:"#ffd700",fontWeight:600,marginBottom:4}}>{WORLDS[cBQ.pw].pw.nm} = DOUBLE damage!</div>}
          <div style={{background:"rgba(0,0,0,0.25)",borderRadius:14,padding:"12px 16px",marginBottom:8,border:"1px solid rgba(255,255,255,0.04)",animation:"su 0.25s"}}>
            <div style={{fontSize:9,opacity:0.25,marginBottom:3}}>Q{bQI+1}/{bQs.length}{streak>1?` | ${streak}x streak`:""}</div>
            <div style={{fontSize:15,fontWeight:600,lineHeight:1.35}}>{cBQ.q}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:6}}>
            {cBQ.c.map((c,i)=>{
              const isC=i===cBQ.a, isS=sel===i;
              let bg2="rgba(255,255,255,0.05)",bd="2px solid rgba(255,255,255,0.05)";
              if(sR){if(isC){bg2="rgba(74,222,128,0.14)";bd="2px solid #4ade80";}else if(isS){bg2="rgba(239,68,68,0.14)";bd="2px solid #ef4444";}}
              return (<button key={i} className="cb" onClick={()=>bAns(i)} style={{background:bg2,border:bd,borderRadius:12,padding:cBQ.c.length===2?"12px 16px":"10px 14px",color:"#fff",fontSize:cBQ.c.length===2?16:14,fontWeight:600,fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:8,opacity:sR&&!isC&&!isS?0.12:1}}>
                <span style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:sR&&isC?"#4ade80":sR&&isS?"#ef4444":"rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>
                  {sR&&isC?"Y":sR&&isS?"X":cBQ.c.length===2?(i===0?"T":"F"):String.fromCharCode(65+i)}
                </span>{c}
              </button>);
            })}
          </div>
          {sR && (<div style={{animation:"bi 0.2s ease"}}>
            <div style={{textAlign:"center",fontSize:16,fontWeight:700,marginBottom:4,color:sel===cBQ.a?"#4ade80":"#ff6b6b"}}>{sel===cBQ.a?(cBQ.pw>=0&&powers.includes(cBQ.pw)?"DOUBLE HIT!":"Hit!"):"Boss strikes!"}</div>
            <div style={{background:sel===cBQ.a?"rgba(74,222,128,0.04)":"rgba(239,68,68,0.04)",borderRadius:10,padding:"8px 12px",marginBottom:6}}>
              <div style={{fontSize:12,lineHeight:1.35,opacity:0.6}}>{cBQ.e}</div>
            </div>
            <div style={{textAlign:"center"}}><button className="cb" onClick={nBQ} style={BS("linear-gradient(135deg,#9333ea,#dc2626)","0 3px 10px rgba(147,51,234,0.2)")}>{bHP<=0?"Victory!":pHP<=0?"Results":"Next"}</button></div>
          </div>)}
        </div>
      )}

      {/* GAME OVER + REPORT */}
      {scr==="boss" && gO && (
        <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:420}}>
          {gO==="win" ? (
            <div>
              <div style={{fontSize:48,animation:"vb 1s ease-in-out infinite"}}>Champion!</div>
              <Hero powers={powers} prizes={prizes} size={90} animate speech="WOOHOO!" showSp gender={gender}/>
              <div style={{fontSize:28,fontWeight:800,color:"#ffd700",margin:"6px 0"}}>{score.toLocaleString()} pts</div>
              <p style={{fontSize:14,opacity:0.5}}>Rank #{getRank(score)} | Powers: {powers.length}/5</p>
              {getRank(score)===1 && <div style={{background:"rgba(255,215,0,0.1)",borderRadius:12,padding:"8px 14px",border:"2px solid rgba(255,215,0,0.3)",marginBottom:8,fontSize:14,fontWeight:700,color:"#ffd700",animation:"gw 2s ease-in-out infinite"}}>#1 HIGH SCORE! Free subscription earned!</div>}
            </div>
          ) : (
            <div>
              <div style={{fontSize:36,marginBottom:6}}>Boss Won!</div>
              <Hero powers={powers} prizes={prizes} size={70} speech="Next time!" showSp gender={gender}/>
              <div style={{fontSize:22,fontWeight:700,margin:"6px 0"}}>{score.toLocaleString()} pts</div>
              <p style={{fontSize:13,opacity:0.55}}>New questions next time!</p>
            </div>
          )}

          {/* LEARNING REPORT - transparent skills */}
          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:14,margin:"12px 0",border:"1px solid rgba(255,255,255,0.05)",textAlign:"left"}}>
            <div style={{fontSize:11,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:8}}>LEARNING REPORT</div>
            <div style={{fontSize:12,opacity:0.45,marginBottom:6}}>{nm} (age {age}) | {p.icon} {p.label} | {p.ptsMult}x multiplier</div>

            {/* HOW SCORE WAS EARNED */}
            <div style={{fontSize:10,fontWeight:700,opacity:0.3,marginBottom:4}}>SCORE BREAKDOWN</div>
            <div style={{fontSize:11,opacity:0.4,marginBottom:8,lineHeight:1.6}}>
              Correct answers: {totC} x {Math.round(PTS.correct * p.ptsMult)} = {totC * Math.round(PTS.correct * p.ptsMult)}<br/>
              Streak bonuses, powers, boss hits, and tips make up the rest.
            </div>

            {/* SKILLS - with clear correlation */}
            <div style={{fontSize:10,fontWeight:700,opacity:0.3,marginBottom:4}}>SKILLS EARNED FROM QUESTIONS</div>
            {SKILLS.map(sk => {
              const pts = skills[sk.id] || 0;
              if (pts === 0) return null;
              const mx = Math.max(totSk,1);
              const pct = Math.min(100,(pts/mx)*200);
              return (
                <div key={sk.id} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,marginBottom:2}}>
                    <span>{sk.em} {sk.nm}</span><span style={{opacity:0.3}}>{pts} pts</span>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.08)",borderRadius:6,height:8,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:sk.cl,borderRadius:6,transition:"width 0.5s"}}/>
                  </div>
                  <div style={{fontSize:9,opacity:0.3,marginTop:1}}>
                    {sk.id==="critical" && "Earned from riddles and thinking questions"}
                    {sk.id==="nature" && "Earned from trivia about biomes and animals"}
                    {sk.id==="survival" && "Earned from real-world safety questions"}
                    {sk.id==="vibe" && "Earned from vibe coding tips and boss victory"}
                    {sk.id==="grit" && "Earned each time you learned from a wrong answer"}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginTop:10}}>
            {gO==="win" && (
              <button className="cb" onClick={()=>{/* Stage 2 placeholder */alert("Stage 2: Build Mode coming soon! You will learn to build your OWN game with AI.");}} style={BS("linear-gradient(135deg,#3b82f6,#8b5cf6)","0 4px 14px rgba(59,130,246,0.3)")}>
                Stage 2: Build Mode
              </button>
            )}
            <button className="cb" onClick={reset} style={BS("linear-gradient(135deg,#ff6b35,#ff3366)","0 3px 10px rgba(255,51,102,0.25)")}>New Adventure</button>
            <button className="cb" onClick={()=>setScr("leaderboard")} style={BS("rgba(255,255,255,0.08)")}>Leaderboard</button>
          </div>
        </div>
      )}

      {/* LEADERBOARD from game over */}
      {scr==="leaderboard" && gO && (
        <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:420,width:"100%"}}>
          <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 16px"}}>Leaderboard</h2>
          {hiS.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,background:i===0?"rgba(255,215,0,0.1)":"rgba(255,255,255,0.04)",borderRadius:14,padding:"12px 16px",marginBottom:6,border:i===0?"2px solid rgba(255,215,0,0.3)":"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{fontSize:22,fontWeight:800,color:i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#fff",minWidth:32,opacity:i<3?1:0.4}}>{i===0?"👑":i+1}</div>
            <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:15,fontWeight:700}}>{s.name} <span style={{fontSize:11,opacity:0.35}}>age {s.age}</span></div></div>
            <div style={{fontSize:18,fontWeight:800,color:"#ffd700"}}>{s.score.toLocaleString()}</div>
          </div>))}
          {hiS.length>0 && <div style={{background:"rgba(255,215,0,0.06)",borderRadius:12,padding:"10px 14px",marginTop:10,border:"1px solid rgba(255,215,0,0.1)",fontSize:12}}>#1 score = FREE subscription!</div>}
          <button className="cb" onClick={reset} style={{...BS("linear-gradient(135deg,#ff6b35,#ff3366)","0 3px 10px rgba(255,51,102,0.25)"),marginTop:12}}>New Adventure</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
