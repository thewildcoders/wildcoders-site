function getDiff(age){
  if(age<=7) return {label:"Explorer",icon:"🌱",numQ:3,summitQ:3,hintOk:true,ptsMult:1,supplyMult:1.5};
  if(age<=10) return {label:"Adventurer",icon:"⚡",numQ:3,summitQ:4,hintOk:true,ptsMult:1.5,supplyMult:1};
  return {label:"Expert",icon:"🔥",numQ:4,summitQ:5,hintOk:false,ptsMult:2,supplyMult:0.8};
}

function TrailMap({current,completed,biomes}){
  const nodes=[{name:"Base Camp",emoji:"🏕️"},...biomes.map(b=>({name:b.name,emoji:b.emoji})),{name:"Summit",emoji:"🏔️"}];
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,padding:"8px 4px",overflowX:"auto",width:"100%"}}>
      {nodes.map((n,i)=>{
        const done=i>0&&i<=completed;
        const isCur=i===current+1;
        const isSummit=i===nodes.length-1;
        const active=done||isCur;
        return (
          <div key={i} style={{display:"flex",alignItems:"center"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:36}}>
              <div style={{width:isCur?32:24,height:isCur?32:24,borderRadius:"50%",background:done?"rgba(74,222,128,0.2)":isCur?"rgba(232,149,138,0.25)":"rgba(255,255,255,0.06)",border:isCur?"2px solid #E8958A":done?"2px solid #4ade80":"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:isCur?16:12,transition:"all 0.3s",position:"relative"}}>
                {done?"✓":n.emoji}
                {isCur&&<div style={{position:"absolute",top:-2,right:-2,width:8,height:8,borderRadius:"50%",background:"#E8958A",animation:"pulse 1.5s ease-in-out infinite"}}/>}
              </div>
              <div style={{fontSize:8,opacity:active?0.5:0.15,marginTop:2,textAlign:"center",fontWeight:600,maxWidth:48,lineHeight:1.1}}>{n.name}</div>
            </div>
            {i<nodes.length-1&&<div style={{width:16,height:2,background:done?"#4ade80":"rgba(255,255,255,0.08)",margin:"0 1px",marginBottom:14,borderRadius:1}}/>}
          </div>
        );
      })}
    </div>
  );
}

function SupplyBar({supplies}){
  const items=[
    {key:"food",icon:"🍖",label:"Food",color:"#E8958A",max:15},
    {key:"water",icon:"💧",label:"Water",color:"#3b9bf6",max:12},
    {key:"health",icon:"❤️",label:"Health",color:"#ef4444",max:7},
    {key:"gear",icon:"🎒",label:"Gear",color:"#a855f7",max:7},
  ];
  return (
    <div style={{display:"flex",gap:10,justifyContent:"center",padding:"6px 8px",flexWrap:"wrap"}}>
      {items.map(it=>{
        const val=supplies[it.key]||0;
        const pct=Math.min(100,(val/it.max)*100);
        const low=pct<25;
        return (
          <div key={it.key} style={{display:"flex",alignItems:"center",gap:4,minWidth:60}}>
            <span style={{fontSize:14}}>{it.icon}</span>
            <div style={{flex:1,minWidth:36}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontWeight:700,opacity:0.4,marginBottom:1}}>
                <span>{it.label}</span><span>{val}</span>
              </div>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:3,height:5,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:low?"#ef4444":it.color,borderRadius:3,transition:"width 0.5s"}}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Particles({items}){
  return (<div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
    {items.map((it,i)=>(<div key={i} style={{position:"absolute",left:`${10+i*18}%`,top:`${5+((i*37)%60)}%`,fontSize:14+i*2,opacity:0.12,animation:`float${i%3} ${6+i*1.5}s ease-in-out infinite`}}>{it}</div>))}
  </div>);
}

const BS=(g,sh)=>({background:g,color:"#fff",padding:"14px 28px",borderRadius:50,fontSize:16,fontWeight:700,fontFamily:"inherit",border:"none",boxShadow:sh||"none",cursor:"pointer",transition:"all 0.15s"});

// ============================================================
// MAIN GAME
// ============================================================

function Game(){
  // Game state
  const [scr,setScr]=useState("welcome");
  const [nm,setNm]=useState("");
  const [age,setAge]=useState(0);
  const [gender,setGender]=useState("");
  const [role,setRole]=useState("");
  const [onb,setOnb]=useState(0);

  // Trail state
  const [biomeIdx,setBiomeIdx]=useState(0);
  const [biomesDone,setBiomesDone]=useState(0);
  const [supplies,setSupplies]=useState({food:10,water:8,health:5,gear:3});

  // Question state
  const [questions,setQuestions]=useState([]);
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [showResult,setShowResult]=useState(false);
  const [showHint,setShowHint]=useState(false);
  const [biomeCorrect,setBiomeCorrect]=useState(0);
  const [usedHint,setUsedHint]=useState(false);

  // Trail events
  const [pendingEvent,setPendingEvent]=useState(null);
  const [eventResult,setEventResult]=useState(null);
  const [eventShown,setEventShown]=useState(false);

  // Score & skills
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [skills,setSkills]=useState({critical:0,nature:0,survival:0,communicate:0,grit:0});
  const [totalCorrect,setTotalCorrect]=useState(0);

  // Boss
  const [bossQs,setBossQs]=useState([]);
  const [bossQIdx,setBossQIdx]=useState(0);
  const [bossHP,setBossHP]=useState(10);
  const [playerHP,setPlayerHP]=useState(10);
  const [gameOver,setGameOver]=useState(null);

  // Post-game
  const [postStep,setPostStep]=useState(0);
  const [parentEmail,setParentEmail]=useState("");
  const [atkAnim,setAtkAnim]=useState(""); // "player" or "boss"

  // Speech
  const [sp,setSp]=useState("");
  const [shSp,setShSp]=useState(false);
  const spTimer=useRef(null);

  const say=(text)=>{setSp(text);setShSp(true);clearTimeout(spTimer.current);spTimer.current=setTimeout(()=>setShSp(false),2000);};

  // Leaderboard
  const [hiScores,setHiScores]=useState([]);
  useEffect(()=>{(async()=>{try{const r=await window.storage.get("wilderness_quest_v2_scores");setHiScores(JSON.parse(r.value));}catch(e){}})();},[]);

  const saveScore=async(s)=>{const newScores=[...hiScores,{name:nm,age,score:s,role}].sort((a,b)=>b.score-a.score).slice(0,10);setHiScores(newScores);try{await window.storage.set("wilderness_quest_v2_scores",JSON.stringify(newScores));}catch(e){}};

  const p=getDiff(age);
  const biome=BIOMES[biomeIdx];

  // Setup supplies based on role
  const startGame=()=>{
    const r=ROLES.find(x=>x.id===role);
    const s={food:10,water:8,health:5,gear:3};
    if(r&&r.bonus){Object.keys(r.bonus).forEach(k=>{s[k]=(s[k]||0)+r.bonus[k];});}
    setSupplies(s);
    // Prep first biome questions
    prepBiome(0);
    setScr("trailMap");
  };

  const prepBiome=(idx)=>{
    const b=BIOMES[idx];
    const filtered=b.questions.filter(q=>p.numQ>=4||q.diff!=="hard");
    const qs=shuffle(filtered).slice(0,p.numQ);
    setQuestions(qs);
    setQIdx(0);
    setSel(null);
    setShowResult(false);
    setShowHint(false);
    setBiomeCorrect(0);
    setUsedHint(false);
    // Set a trail event for mid-biome
    const ev=pick(TRAIL_EVENTS);
    setPendingEvent(ev);
    setEventShown(false);
    setEventResult(null);
  };

  const answer=(idx)=>{
    if(showResult)return;
    setSel(idx);
    setShowResult(true);
    const q=questions[qIdx];
    const correct=idx===q.answer;
    if(correct){
      setTotalCorrect(t=>t+1);
      setBiomeCorrect(c=>c+1);
      const pts=Math.round(100*p.ptsMult*(1+streak*0.25));
      setScore(s=>s+pts);
      setStreak(s=>s+1);
      setSkills(sk=>({...sk,[q.skill]:(sk[q.skill]||0)+pts}));
      say(pick(["Yes!","Nailed it!","Great!","Awesome!"]));
      // Water check - dehydration
      if(supplies.water<=0)setSupplies(s=>({...s,health:Math.max(0,s.health-1)}));
      // Supply bonus
      const bonus=role==="scout"?2:1;
      if(q.type==="survival"||q.type==="nature")setSupplies(s=>({...s,food:Math.min(15,s.food+bonus)}));
      if(q.type==="critical")setSupplies(s=>({...s,water:Math.min(12,s.water+1)}));
    }else{
      setStreak(0);
      setSkills(sk=>({...sk,grit:(sk.grit||0)+25}));
      say(pick(["Tricky!","Not quite!","Next one!"]));
      // Supply cost
      const cost=role==="medic"?0:2;
      if(cost>0)setSupplies(s=>({...s,health:Math.max(0,s.health-cost)}));
    }
  };

  const nextQuestion=()=>{
    setSel(null);setShowResult(false);setShowHint(false);setUsedHint(false);
    // Check if health is 0
    if(supplies.health<=0){setGameOver("exhausted");setScr("gameEnd");return;}
    // Check if should show trail event (after question 1 or 2)
    if(qIdx===1&&!eventShown&&pendingEvent){setScr("event");return;}
    if(qIdx+1>=questions.length){
      // Biome complete
      const newDone=biomesDone+1;
      setBiomesDone(newDone);
      if(biomeCorrect>=2){
        setScore(s=>s+200);setSkills(sk=>({...sk,grit:(sk.grit||0)+200}));say("POWER UP!");
      }
      setScr("biomeDone");
    }else{
      setQIdx(q=>q+1);
    }
  };

  const goToCampfire=()=>{
    // Deplete supplies at campfire
    setSupplies(s=>({
      ...s,
      food:Math.max(0,s.food-3),
      water:Math.max(0,s.water-2),
    }));
    setScr("campfire");
  };

  const nextBiome=()=>{
    const next=biomeIdx+1;
    if(next>=BIOMES.length){
      // Go to summit
      const sQs=shuffle(SUMMIT_QS).slice(0,p.summitQ);
      setBossQs(sQs);
      setBossQIdx(0);
      setBossHP(Math.max(6,p.summitQ*2));
      setPlayerHP(Math.max(2,supplies.health*2));
      setScr("preSummit");
    }else{
      setBiomeIdx(next);
      prepBiome(next);
      setScr("biomeIntro");
    }
  };

  const handleEvent=(choiceIdx)=>{
    const choice=pendingEvent.choices[choiceIdx];
    setEventResult({text:choice.result,effect:choice.effect});
    setEventShown(true);
    // Apply effects
    setSupplies(s=>{
      const n={...s};
      Object.keys(choice.effect).forEach(k=>{
        if(k in n)n[k]=Math.max(0,Math.min(k==="food"?15:k==="water"?12:7,n[k]+choice.effect[k]));
      });
      return n;
    });
  };

  const continueAfterEvent=()=>{
    setQIdx(q=>q+1);
    setScr("question");
  };

  const bossAnswer=(idx)=>{
    if(showResult)return;
    setSel(idx);setShowResult(true);
    const q=bossQs[bossQIdx];
    const correct=idx===q.answer;
    if(correct){
      setTotalCorrect(t=>t+1);
      const pts=Math.round(150*p.ptsMult);
      setScore(s=>s+pts);
      setStreak(s=>s+1);
      setSkills(sk=>({...sk,[q.skill]:(sk[q.skill]||0)+pts}));
      setBossHP(h=>Math.max(0,h-2));
      say(pick(["Hit!","Take that!","Direct hit!"]));
      setAtkAnim("player");setTimeout(()=>setAtkAnim(""),1800);
    }else{
      setStreak(0);
      setSkills(sk=>({...sk,grit:(sk.grit||0)+30}));
      setPlayerHP(h=>Math.max(0,h-2));
      say(pick(["Ouch!","Ow!","Keep going!"]));
      setAtkAnim("boss");setTimeout(()=>setAtkAnim(""),1800);
    }
  };

  const nextBossQ=()=>{
    setSel(null);setShowResult(false);setShowHint(false);
    if(bossHP<=0){setGameOver("win");saveScore(score+(supplies.health>0?300:0)+(supplies.food>0?200:0));setScr("gameEnd");return;}
    if(playerHP<=0){setGameOver("lose");saveScore(score);setScr("gameEnd");return;}
    if(bossQIdx+1>=bossQs.length){
      // Cycle back through questions if both still alive
      setBossQIdx(0);
      setBossQs(qs=>shuffle([...qs]));
    } else {
      setBossQIdx(q=>q+1);
    }
  };

  const reset=()=>{
    setScr("welcome");setOnb(0);setNm("");setAge(0);setGender("");setRole("");
    setBiomeIdx(0);setBiomesDone(0);setQIdx(0);setSel(null);setShowResult(false);
    setShowHint(false);setBiomeCorrect(0);setScore(0);setStreak(0);
    setSkills({critical:0,nature:0,survival:0,communicate:0,grit:0});
    setTotalCorrect(0);setGameOver(null);setPostStep(0);setParentEmail("");
    setBossQIdx(0);setBossHP(10);setPlayerHP(10);setAtkAnim("");
  };

  const totSk=Object.values(skills).reduce((a,b)=>a+b,0);
  const curQ=scr==="question"?questions[qIdx]:scr==="summit"?bossQs[bossQIdx]:null;

  // ============================================================
  // RENDER
  // ============================================================

  const bg=scr==="campfire"?"linear-gradient(180deg,#0a0a1e,#1a1028 50%,#2a1a3a)":scr==="preSummit"||scr==="summit"?"linear-gradient(180deg,#1a1a2e,#2a2040 50%,#4a2060)":biome?biome.colors.bg:"linear-gradient(180deg,#090d18,#0e1628)";

  return (
    <div style={{minHeight:"100vh",background:bg,color:"#fff",fontFamily:"'Fredoka',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",position:"relative",overflow:"hidden",transition:"background 0.8s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
        @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
        @keyframes bi{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes su{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes charIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        @keyframes bossIdle{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.03)}}
        @keyframes float0{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(10deg)}}
        @keyframes float1{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(-8deg)}}
        @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
        @keyframes bossHit{0%{transform:translateX(0) scale(1)}8%{transform:translateX(-28px) scale(0.85)}18%{transform:translateX(24px) scale(1.1)}28%{transform:translateX(-20px) scale(0.9)}38%{transform:translateX(16px) scale(1.05)}50%{transform:translateX(-10px)}65%{transform:translateX(6px)}80%{transform:translateX(-3px)}100%{transform:translateX(0) scale(1)}}
        @keyframes playerHit{0%{transform:translateX(0) scale(1)}8%{transform:translateX(24px) scale(0.85)}18%{transform:translateX(-20px) scale(1.1)}28%{transform:translateX(16px) scale(0.9)}38%{transform:translateX(-12px) scale(1.05)}50%{transform:translateX(8px)}65%{transform:translateX(-4px)}80%{transform:translateX(2px)}100%{transform:translateX(0) scale(1)}}
        @keyframes slashRight{0%{opacity:1;transform:translateX(-50px) scale(0.6) rotate(-40deg)}25%{opacity:1;transform:translateX(-10px) scale(1.5) rotate(-10deg)}50%{opacity:1;transform:translateX(20px) scale(2.2) rotate(15deg)}75%{opacity:0.6;transform:translateX(45px) scale(1.5) rotate(30deg)}100%{opacity:0;transform:translateX(70px) scale(0.4) rotate(50deg)}}
        @keyframes slashLeft{0%{opacity:1;transform:translateX(50px) scale(0.6) rotate(40deg)}25%{opacity:1;transform:translateX(10px) scale(1.5) rotate(10deg)}50%{opacity:1;transform:translateX(-20px) scale(2.2) rotate(-15deg)}75%{opacity:0.6;transform:translateX(-45px) scale(1.5) rotate(-30deg)}100%{opacity:0;transform:translateX(-70px) scale(0.4) rotate(-50deg)}}
        @keyframes screenShake{0%{transform:translate(0,0)}8%{transform:translate(-6px,-5px)}16%{transform:translate(7px,4px)}24%{transform:translate(-5px,6px)}32%{transform:translate(6px,-4px)}40%{transform:translate(-4px,5px)}50%{transform:translate(5px,-3px)}60%{transform:translate(-3px,3px)}72%{transform:translate(2px,-2px)}85%{transform:translate(-1px,1px)}100%{transform:translate(0,0)}}
        @keyframes dmgNumber{0%{opacity:1;transform:translateY(0) scale(0.5)}20%{opacity:1;transform:translateY(-10px) scale(1.6)}40%{opacity:1;transform:translateY(-25px) scale(1.8)}60%{opacity:0.8;transform:translateY(-40px) scale(1.4)}100%{opacity:0;transform:translateY(-70px) scale(0.6)}}
        @keyframes hitFlash{0%{opacity:0}15%{opacity:0.5}40%{opacity:0.3}100%{opacity:0}}
        @keyframes impactBurst{0%{transform:scale(0);opacity:1}30%{transform:scale(1.5);opacity:0.8}60%{transform:scale(3);opacity:0.5}100%{transform:scale(5);opacity:0}}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(232,149,138,0.15)}50%{box-shadow:0 0 20px rgba(232,149,138,0.4)}}
        .cb{transition:all 0.15s;cursor:pointer;border:none}
        .cb:hover{transform:translateY(-2px);filter:brightness(1.08)}
        .cb:active{transform:translateY(0)}
      `}</style>

      {/* PERSISTENT TRAIL MAP — shown during gameplay */}
      {["biomeIntro","question","event","biomeDone","campfire","preSummit","summit"].includes(scr)&&(
        <div style={{width:"100%",maxWidth:660,padding:"14px 12px 0",position:"relative",zIndex:10}}>
          <TrailMap current={biomeIdx} completed={biomesDone} biomes={BIOMES}/>
          <SupplyBar supplies={supplies}/>
        </div>
      )}

      {/* CONTENT AREA */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px 20px",width:"100%",maxWidth:700,position:"relative"}}>

        {/* === WELCOME === */}
        {scr==="welcome"&&onb===0&&(
          <div style={{textAlign:"center",animation:"bi 0.5s ease",maxWidth:560}}>
            <div style={{fontSize:52,marginBottom:8}}>🌲🏔️🌴</div>
            <h1 style={{fontSize:42,fontWeight:800,margin:"0 0 12px"}}>Wilderness Quest</h1>
            <p style={{fontSize:18,opacity:0.45,marginBottom:28,lineHeight:1.55}}>Lead an expedition from Base Camp to the Mountain Summit. Manage your supplies, survive 5 biomes, and defeat the Summit Guardian.</p>
            <button className="cb" onClick={()=>setOnb(1)} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)")}>Start Expedition</button>

          </div>
        )}

        {/* NAME */}
        {scr==="welcome"&&onb===1&&(
          <div style={{textAlign:"center",animation:"bi 0.4s ease",maxWidth:480}}>
            <h2 style={{fontSize:30,fontWeight:700,margin:"0 0 18px"}}>What's your name, explorer?</h2>
            <input type="text" placeholder="Type your name" value={nm} onChange={e=>setNm(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nm.trim())setOnb(2);}} style={{background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"14px 18px",color:"#fff",fontSize:16,fontFamily:"inherit",width:"100%",textAlign:"center",boxSizing:"border-box",outline:"none",marginBottom:10}} />
            <button className="cb" onClick={()=>{if(nm.trim())setOnb(2);}} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 3px 10px rgba(232,149,138,0.2)")}>Next</button>
          </div>
        )}

        {/* AGE */}
        {scr==="welcome"&&onb===2&&(
          <div style={{textAlign:"center",animation:"bi 0.4s ease"}}>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 12px"}}>How old are you, {nm}?</h2>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              {[{label:"5-7",icon:"🌱",val:6},{label:"8-10",icon:"⚡",val:9},{label:"11-13",icon:"🔥",val:12}].map(a=>(
                <button key={a.val} className="cb" onClick={()=>{setAge(a.val);setOnb(3);}} style={{background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"16px 22px",color:"#fff",fontFamily:"inherit"}}>
                  <div style={{fontSize:28}}>{a.icon}</div>
                  <div style={{fontSize:16,fontWeight:700}}>{a.label}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* GENDER */}
        {scr==="welcome"&&onb===3&&(
          <div style={{textAlign:"center",animation:"bi 0.4s ease"}}>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 12px"}}>Choose your explorer</h2>
            <div style={{display:"flex",gap:16,justifyContent:"center"}}>
              {["boy","girl"].map(g=>(
                <button key={g} className="cb" onClick={()=>{setGender(g);setOnb(4);}} style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:18,padding:"14px 18px",color:"#fff",fontFamily:"inherit"}}>
                  <Explorer size={70} gender={g} role="scout" animate={false}/>
                  <div style={{fontSize:14,fontWeight:700,marginTop:4}}>{g==="boy"?"Boy":"Girl"}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ROLE */}
        {scr==="welcome"&&onb===4&&(
          <div style={{textAlign:"center",animation:"bi 0.4s ease",maxWidth:400}}>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Choose your role</h2>
            <p style={{fontSize:13,opacity:0.4,marginBottom:14}}>Each role gives different starting supplies</p>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              {ROLES.map(r=>(
                <button key={r.id} className="cb" onClick={()=>{setRole(r.id);setOnb(5);}} style={{flex:"1 1 100px",background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:16,padding:"14px 12px",color:"#fff",fontFamily:"inherit"}}>
                  <div style={{fontSize:28}}>{r.emoji}</div>
                  <div style={{fontSize:15,fontWeight:700}}>{r.name}</div>
                  <div style={{fontSize:11,opacity:0.4}}>{r.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* EXPEDITION PLAN */}
        {scr==="welcome"&&onb===5&&(
          <div style={{textAlign:"center",animation:"bi 0.5s ease",maxWidth:580,width:"100%"}}>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 6px"}}>Plan Your Expedition</h2>
            <p style={{fontSize:13,opacity:0.4,marginBottom:14}}>{nm} the {ROLES.find(r=>r.id===role)?.name} | {getDiff(age).icon} {getDiff(age).label}</p>
            <TrailMap current={-1} completed={0} biomes={BIOMES}/>
            <div style={{margin:"12px 0"}}>
              <div style={{fontSize:11,fontWeight:700,opacity:0.3,marginBottom:6}}>STARTING SUPPLIES</div>
              <SupplyBar supplies={{food:10+(ROLES.find(r=>r.id===role)?.bonus?.food||0),water:8+(ROLES.find(r=>r.id===role)?.bonus?.water||0),health:5+(ROLES.find(r=>r.id===role)?.bonus?.health||0),gear:3+(ROLES.find(r=>r.id===role)?.bonus?.gear||0)}}/>
            </div>
            <button className="cb" onClick={()=>{startGame();}} style={{...BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)"),animation:"glow 2s ease-in-out infinite"}}>Begin Expedition</button>
          </div>
        )}

        {/* TRAIL MAP SCREEN */}
        {scr==="trailMap"&&(
          <div style={{textAlign:"center",animation:"bi 0.5s ease"}}>
            <div style={{marginTop:20,marginBottom:10}}><Explorer size={80} gender={gender} role={role} animate speech="Let's go!" showSp/></div>
            <div style={{marginTop:20}}>
              <button className="cb" onClick={()=>{prepBiome(0);setScr("biomeIntro");}} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)")}>Enter {BIOMES[0].name}</button>
            </div>
          </div>
        )}

        {/* BIOME INTRO */}
        {scr==="biomeIntro"&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:420}}>
            <Particles items={biome.particles}/>
            <div style={{fontSize:52,margin:"8px 0"}}>{biome.emoji}</div>
            <h2 style={{fontSize:28,fontWeight:700,margin:"0 0 8px"}}>{biome.name}</h2>
            <p style={{fontSize:16,opacity:0.5,lineHeight:1.55,marginBottom:10}}>{biome.desc}</p>
            <p style={{fontSize:12,opacity:0.3}}>{p.numQ} challenges ahead{pendingEvent?" + 1 trail event":""}</p>
            <div style={{marginTop:28,marginBottom:14}}>
              <Explorer size={70} gender={gender} role={role} animate speech="Ready!" showSp/>
            </div>
            <button className="cb" onClick={()=>setScr("question")} style={BS(`linear-gradient(135deg,${biome.colors.accent},${biome.colors.accent}bb)`,`0 4px 12px ${biome.colors.accent}44`)}>Enter</button>
          </div>
        )}

        {/* QUESTION */}
        {scr==="question"&&curQ&&(
          <div style={{maxWidth:460,width:"100%",zIndex:1,position:"relative",animation:"bi 0.3s ease"}}>
            <Particles items={biome.particles}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:600,opacity:0.4,marginBottom:4}}>
              <span>{biome.emoji} {biome.name}</span>
              <span>Q{qIdx+1}/{questions.length}{streak>1?` | ${streak}x streak`:""}</span>
            </div>
            <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:8}}>
              {Array.from({length:questions.length}).map((_,i)=>(<div key={i} style={{width:32,height:5,borderRadius:3,background:i<qIdx?biome.colors.accent:i===qIdx?"#fff":"rgba(255,255,255,0.08)"}}/>))}
            </div>
            <div style={{display:"flex",justifyContent:"center",marginTop:24,marginBottom:14}}>
              <Explorer size={45} gender={gender} role={role} animate speech={sp} showSp={shSp}/>
            </div>
            <div style={{background:biome.colors.card,borderRadius:16,padding:"14px 18px",marginBottom:10,border:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{fontSize:10,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:6}}>{curQ.type.toUpperCase()}</div>
              <div style={{fontSize:17,fontWeight:600,lineHeight:1.5}}>{curQ.q}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:8}}>
              {curQ.choices.map((c,i)=>{
                const isC=i===curQ.answer,isS=sel===i;
                let bg2="rgba(255,255,255,0.06)",bd="2px solid rgba(255,255,255,0.06)";
                if(showResult){if(isC){bg2="rgba(74,222,128,0.15)";bd="2px solid #4ade80";}else if(isS){bg2="rgba(239,68,68,0.15)";bd="2px solid #ef4444";}}
                return (<button key={i} className="cb" onClick={()=>answer(i)} disabled={showResult} style={{background:bg2,border:bd,borderRadius:14,padding:"16px 22px",color:"#fff",fontSize:18,fontWeight:600,fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:10,opacity:showResult&&!isC&&!isS?0.15:1}}>
                  <span style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:showResult&&isC?"#4ade80":showResult&&isS?"#ef4444":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>
                    {showResult&&isC?"✓":showResult&&isS?"✗":String.fromCharCode(65+i)}
                  </span>{c}
                </button>);
              })}
            </div>
            {supplies.food<=0&&!showResult&&<div style={{fontSize:11,color:"#E8958A",fontWeight:600,marginBottom:4}}>⚠️ No food! Hints disabled.</div>}
            {supplies.water<=0&&!showResult&&<div style={{fontSize:11,color:"#3b9bf6",fontWeight:600,marginBottom:4}}>⚠️ No water! Losing health each question.</div>}
            {!showResult&&!showHint&&p.hintOk&&supplies.food>0&&(<button className="cb" onClick={()=>{setShowHint(true);setUsedHint(true);setScore(s=>Math.max(0,s-50));if(curQ)setSkills(sk=>({...sk,[curQ.skill]:Math.max(0,(sk[curQ.skill]||0)-50)}));}} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",color:"#fff",padding:"5px 14px",borderRadius:14,fontSize:11,fontFamily:"inherit",opacity:0.3}}>Hint (-50pts)</button>)}
            {showHint&&!showResult&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"6px 12px",fontSize:12,opacity:0.5,animation:"su 0.2s"}}>{curQ.hint}</div>}
            {showResult&&(
              <div style={{animation:"bi 0.25s ease",textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:800,marginBottom:10,color:sel===curQ.answer?"#4ade80":"#ff6b6b"}}>{sel===curQ.answer?"✅ Correct!":"❌ Not quite!"}</div>
                <div style={{background:sel===curQ.answer?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",borderRadius:14,padding:"14px 18px",border:sel===curQ.answer?"1px solid rgba(74,222,128,0.15)":"1px solid rgba(239,68,68,0.15)",marginBottom:10,textAlign:"left"}}>
                  <div style={{fontSize:10,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:4}}>{sel===curQ.answer?"WHY THIS IS RIGHT":"THE RIGHT ANSWER"}</div>
                  <div style={{fontSize:18,lineHeight:1.55,opacity:0.7}}>{curQ.explanation||curQ.hint}</div>
                  {sel!==curQ.answer&&<div style={{fontSize:14,fontWeight:700,color:"#4ade80",marginTop:8}}>✓ {curQ.choices[curQ.answer]}</div>}
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:8}}>
                  {sel===curQ.answer&&(curQ.type==="survival"||curQ.type==="nature")&&<div style={{fontSize:13,color:"#4ade80",fontWeight:600}}>+{role==="scout"?2:1} 🍖 Food found!</div>}
                  {sel===curQ.answer&&curQ.type==="critical"&&<div style={{fontSize:13,color:"#3b9bf6",fontWeight:600}}>+1 💧 Water found!</div>}
                  {sel!==curQ.answer&&role!=="medic"&&<div style={{fontSize:13,color:"#ef4444",fontWeight:600}}>-2 ❤️ Health lost</div>}
                  {sel!==curQ.answer&&role==="medic"&&<div style={{fontSize:13,color:"#3b9bf6",fontWeight:600}}>🩺 Medic perk: No health lost!</div>}
                </div>
                <button className="cb" onClick={nextQuestion} style={BS("rgba(255,255,255,0.1)")}>Continue</button>
              </div>
            )}
          </div>
        )}

        {/* TRAIL EVENT */}
        {scr==="event"&&pendingEvent&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:400}}>
            <div style={{fontSize:48,marginBottom:8}}>{pendingEvent.emoji}</div>
            <div style={{fontSize:11,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:8}}>TRAIL EVENT</div>
            <h3 style={{fontSize:22,fontWeight:700,margin:"0 0 16px"}}>{pendingEvent.text}</h3>
            {!eventResult?(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {pendingEvent.choices.map((c,i)=>(
                  <button key={i} className="cb" onClick={()=>handleEvent(i)} style={{background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 18px",color:"#fff",fontSize:14,fontWeight:600,fontFamily:"inherit",textAlign:"left"}}>{c.text}</button>
                ))}
              </div>
            ):(
              <div style={{animation:"bi 0.3s ease"}}>
                <div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
                  <p style={{fontSize:14,opacity:0.6}}>{eventResult.text}</p>
                  <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8}}>
                    {Object.entries(eventResult.effect).filter(([k,v])=>v!==0).map(([k,v])=>(
                      <span key={k} style={{fontSize:12,fontWeight:700,color:v>0?"#4ade80":"#ef4444"}}>{v>0?"+":""}{v} {k==="food"?"🍖":k==="water"?"💧":k==="health"?"❤️":"🎒"}</span>
                    ))}
                  </div>
                </div>
                <button className="cb" onClick={continueAfterEvent} style={BS("rgba(255,255,255,0.1)")}>Continue</button>
              </div>
            )}
          </div>
        )}

        {/* BIOME DONE */}
        {scr==="biomeDone"&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:400}}>
            <Particles items={biome.particles}/>
            <div style={{fontSize:48}}>{biome.emoji}</div>
            <h2 style={{fontSize:22,fontWeight:700,margin:"4px 0"}}>{biome.name} Complete!</h2>
            <p style={{fontSize:15}}>{nm}: <strong>{biomeCorrect}/{p.numQ}</strong> correct</p>
            <div style={{marginTop:28,marginBottom:14}}>
              <Explorer size={70} gender={gender} role={role} animate speech={biomeCorrect>=2?"Power up!":"Onward!"} showSp/>
            </div>
            {biomeCorrect>=2?(
              <div style={{background:"rgba(74,222,128,0.08)",borderRadius:14,padding:12,border:"2px solid #4ade80",marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:700,opacity:0.5}}>REWARD EARNED!</div>
                <div style={{fontSize:26}}>{biome.reward.emoji}</div>
                <div style={{fontSize:15,fontWeight:700}}>{biome.reward.name}</div>
              </div>
            ):(
              <div style={{background:"rgba(239,68,68,0.06)",borderRadius:14,padding:12,border:"2px solid rgba(239,68,68,0.2)",marginBottom:10}}>
                <p style={{margin:0,fontSize:13}}>Need 2 correct for the reward. Keep going!</p>
              </div>
            )}
            <button className="cb" onClick={goToCampfire} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 3px 10px rgba(232,149,138,0.2)")}>Make Camp</button>
          </div>
        )}

        {/* CAMPFIRE */}
        {scr==="campfire"&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:420}}>
            <div style={{fontSize:48,marginBottom:8}}>🔥</div>
            <h2 style={{fontSize:26,fontWeight:700,margin:"0 0 8px"}}>Camp for the Night</h2>
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:"16px",border:"1px solid rgba(255,255,255,0.05)",marginBottom:12,textAlign:"left"}}>
              <p style={{fontSize:15,opacity:0.5,lineHeight:1.65,margin:"0 0 10px"}}>{biome.campfire}</p>
              <div style={{background:"rgba(232,149,138,0.06)",borderRadius:10,padding:"8px 12px",border:"1px solid rgba(232,149,138,0.1)"}}>
                <div style={{fontSize:10,fontWeight:700,opacity:0.3,marginBottom:2}}>DID YOU KNOW?</div>
                <div style={{fontSize:12,opacity:0.4}}>{biome.funFact}</div>
              </div>
            </div>
            <div style={{fontSize:11,opacity:0.3,marginBottom:4}}>Supplies used overnight: -3 🍖 -2 💧</div>
            {(supplies.food<=2||supplies.water<=1)&&<div style={{fontSize:12,color:"#E8958A",fontWeight:600,marginBottom:8}}>⚠️ Supplies running low!</div>}
            <button className="cb" onClick={nextBiome} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 3px 10px rgba(232,149,138,0.2)")}>
              {biomeIdx+1>=BIOMES.length?"Approach Summit":"Continue to "+BIOMES[biomeIdx+1]?.name}
            </button>
          </div>
        )}

        {/* PRE-SUMMIT */}
        {scr==="preSummit"&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:420}}>
            <Particles items={["🔥","💀","⚡","💥"]}/>
            <div style={{fontSize:48,marginBottom:4}}>🏔️</div>
            <h2 style={{fontSize:28,fontWeight:700,margin:"0 0 8px"}}>The Summit Guardian</h2>
            <p style={{fontSize:13,opacity:0.4,marginBottom:8}}>A creature guards the peak. Answer its challenges to reach the top.</p>
            <BossCreature hp={bossHP} maxHp={bossHP}/>
            <div style={{marginTop:30,marginBottom:16}}>
              <Explorer size={60} gender={gender} role={role} animate speech="Bring it!" showSp/>
            </div>
            <button className="cb" onClick={()=>setScr("summit")} style={{...BS("linear-gradient(135deg,#9333ea,#dc2626)","0 4px 16px rgba(147,51,234,0.3)"),animation:"glow 2s ease-in-out infinite"}}>FIGHT!</button>
          </div>
        )}

        {/* SUMMIT BATTLE */}
        {scr==="summit"&&bossQs[bossQIdx]&&(
          <div style={{maxWidth:460,width:"100%",zIndex:1,position:"relative"}}>
            <Particles items={["🔥","💀","⚡","💥"]}/>
            <HPBar cur={bossHP} max={Math.max(6,p.summitQ*2)} label="Summit Guardian" color="#dc2626"/>
            <HPBar cur={playerHP} max={Math.max(2,supplies.health*2)||10} label={nm} color="#4ade80"/>
            <div style={{animation:atkAnim?"screenShake 1.2s ease":"none",position:"relative"}}>
              {/* SCREEN FLASH */}
              {atkAnim&&<div style={{position:"absolute",top:0,left:"-10%",right:"-10%",bottom:0,background:atkAnim==="player"?"rgba(74,222,128,0.15)":"rgba(239,68,68,0.15)",animation:"hitFlash 1.2s ease forwards",borderRadius:20,zIndex:5,pointerEvents:"none"}}/>}
              <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",margin:"10px 0",minHeight:120}}>
                <div style={{animation:atkAnim==="boss"?"playerHit 1.4s ease":"none",position:"relative"}}>
                  <Explorer size={65} gender={gender} role={role} animate speech={sp} showSp={shSp}/>
                  {/* PLAYER ATTACK - sword slash */}
                  {atkAnim==="player"&&(<>
                    <div style={{position:"absolute",top:"20%",right:-20,fontSize:36,animation:"slashRight 1s ease forwards",zIndex:10}}>⚔️</div>
                    <div style={{position:"absolute",top:"10%",right:-30,fontSize:20,animation:"slashRight 1.1s ease 0.15s forwards",opacity:0,zIndex:10}}>💫</div>
                  </>)}
                  {/* BOSS ATTACK HITS PLAYER */}
                  {atkAnim==="boss"&&(<>
                    <div style={{position:"absolute",top:"15%",left:"20%",width:40,height:40,borderRadius:"50%",background:"rgba(239,68,68,0.4)",animation:"impactBurst 1.2s ease forwards",zIndex:10}}/>
                    <div style={{position:"absolute",top:"-10%",left:"30%",fontSize:24,fontWeight:900,color:"#ff4444",animation:"dmgNumber 1.5s ease forwards",zIndex:15}}>-2</div>
                  </>)}
                </div>
                <div style={{fontSize:22,fontWeight:900,opacity:atkAnim?0.05:0.2,transition:"opacity 0.2s"}}>VS</div>
                <div style={{animation:atkAnim==="player"?"bossHit 1.4s ease":"none",position:"relative"}}>
                  <BossCreature hp={bossHP} maxHp={Math.max(6,p.summitQ*2)}/>
                  {/* PLAYER ATTACK HITS BOSS */}
                  {atkAnim==="player"&&(<>
                    <div style={{position:"absolute",top:"15%",right:"20%",width:40,height:40,borderRadius:"50%",background:"rgba(74,222,128,0.4)",animation:"impactBurst 1.2s ease forwards",zIndex:10}}/>
                    <div style={{position:"absolute",top:"-10%",right:"25%",fontSize:24,fontWeight:900,color:"#4ade80",animation:"dmgNumber 1.5s ease forwards",zIndex:15}}>-2</div>
                  </>)}
                  {/* BOSS ATTACK - claw slash */}
                  {atkAnim==="boss"&&(<>
                    <div style={{position:"absolute",top:"20%",left:-20,fontSize:36,animation:"slashLeft 1s ease forwards",zIndex:10}}>💥</div>
                    <div style={{position:"absolute",top:"35%",left:-15,fontSize:20,animation:"slashLeft 1.1s ease 0.15s forwards",opacity:0,zIndex:10}}>🔥</div>
                  </>)}
                </div>
              </div>
            </div>
            <div style={{background:"rgba(0,0,0,0.25)",borderRadius:14,padding:"12px 16px",marginBottom:8,border:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{fontSize:9,opacity:0.25,marginBottom:3}}>Q{bossQIdx+1}/{bossQs.length}</div>
              <div style={{fontSize:15,fontWeight:600,lineHeight:1.4}}>{bossQs[bossQIdx].q}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:8}}>
              {bossQs[bossQIdx].choices.map((c,i)=>{
                const isC=i===bossQs[bossQIdx].answer,isS=sel===i;
                let bg2="rgba(255,255,255,0.06)",bd="2px solid rgba(255,255,255,0.06)";
                if(showResult){if(isC){bg2="rgba(74,222,128,0.15)";bd="2px solid #4ade80";}else if(isS){bg2="rgba(239,68,68,0.15)";bd="2px solid #ef4444";}}
                return (<button key={i} className="cb" onClick={()=>bossAnswer(i)} disabled={showResult} style={{background:bg2,border:bd,borderRadius:14,padding:"16px 22px",color:"#fff",fontSize:18,fontWeight:600,fontFamily:"inherit",textAlign:"left",opacity:showResult&&!isC&&!isS?0.15:1}}>
                  {c}
                </button>);
              })}
            </div>
            {showResult&&(
              <div style={{textAlign:"center",animation:"bi 0.25s ease"}}>
                <div style={{fontSize:28,fontWeight:800,color:sel===bossQs[bossQIdx].answer?"#4ade80":"#ff6b6b",marginBottom:8,textShadow:sel===bossQs[bossQIdx].answer?"0 0 10px rgba(74,222,128,0.5)":"0 0 10px rgba(239,68,68,0.5)"}}>{sel===bossQs[bossQIdx].answer?"⚔️ DIRECT HIT!":"💥 OUCH!"}</div>
                <div style={{background:sel===bossQs[bossQIdx].answer?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",borderRadius:14,padding:"12px 16px",border:sel===bossQs[bossQIdx].answer?"1px solid rgba(74,222,128,0.15)":"1px solid rgba(239,68,68,0.15)",marginBottom:10,textAlign:"left"}}>
                  <div style={{fontSize:10,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:3}}>{sel===bossQs[bossQIdx].answer?"WHY THIS IS RIGHT":"THE RIGHT ANSWER"}</div>
                  <div style={{fontSize:17,lineHeight:1.5,opacity:0.7}}>{bossQs[bossQIdx].hint}</div>
                  {sel!==bossQs[bossQIdx].answer&&<div style={{fontSize:13,fontWeight:700,color:"#4ade80",marginTop:6}}>✓ {bossQs[bossQIdx].choices[bossQs[bossQIdx].answer]}</div>}
                </div>
                <div style={{fontSize:14,fontWeight:700,color:sel===bossQs[bossQIdx].answer?"#4ade80":"#ef4444",marginBottom:8}}>{sel===bossQs[bossQIdx].answer?"-2 Boss HP":"-2 Your HP"}</div>
                <button className="cb" onClick={nextBossQ} style={BS("rgba(255,255,255,0.1)")}>Continue</button>
              </div>
            )}
          </div>
        )}

        {/* === GAME END === */}
        {scr==="gameEnd"&&postStep===0&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:620,width:"100%"}}>
            {gameOver==="win"?(
              <div>
                <div style={{fontSize:48,marginBottom:4}}>🏔️</div>
                <h2 style={{fontSize:36,fontWeight:800,margin:"0 0 8px"}}>Summit Reached!</h2>
                <div style={{marginTop:24,marginBottom:10}}><Explorer size={65} gender={gender} role={role} animate speech="CHAMPION!" showSp/></div>
                <div style={{fontSize:32,fontWeight:800,color:"#ffd700",margin:"8px 0"}}>{score.toLocaleString()} pts</div>
                <div style={{fontSize:13,opacity:0.3,marginBottom:4}}>({Object.values(skills).reduce((a,b)=>a+b,0).toLocaleString()} skill pts{score!==Object.values(skills).reduce((a,b)=>a+b,0)?" + bonuses":""})</div>
              </div>
            ):gameOver==="exhausted"?(
              <div>
                <div style={{fontSize:36}}>🏕️</div>
                <h2 style={{fontSize:22,fontWeight:700,margin:"4px 0"}}>Had to turn back</h2>
                <p style={{fontSize:13,opacity:0.4}}>You ran out of health. But every explorer learns from the trail.</p>
                <div style={{fontSize:20,fontWeight:700,margin:"4px 0"}}>{score.toLocaleString()} pts</div>
              </div>
            ):(
              <div>
                <div style={{fontSize:36}}>⛰️</div>
                <h2 style={{fontSize:22,fontWeight:700,margin:"4px 0"}}>The Guardian Won</h2>
                <p style={{fontSize:13,opacity:0.4}}>So close! The summit will wait for your return.</p>
                <div style={{fontSize:20,fontWeight:700,margin:"4px 0"}}>{score.toLocaleString()} pts</div>
              </div>
            )}

            {/* BASELINE REPORT */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:20,margin:"16px 0",border:"1px solid rgba(255,255,255,0.05)",textAlign:"left"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,opacity:0.3,letterSpacing:1}}>SESSION 1 BASELINE</div>
                <div style={{fontSize:8,background:"rgba(232,149,138,0.15)",color:"#E8958A",padding:"2px 8px",borderRadius:10,fontWeight:700}}>NEW</div>
              </div>
              <div style={{fontSize:13,opacity:0.4,marginBottom:6}}>{nm} ({getDiff(age).label}) | {ROLES.find(r=>r.id===role)?.name} | Biomes: {biomesDone}/5</div>
              <div style={{fontSize:10,opacity:0.25,marginBottom:8}}>Here's what {nm} practiced. Next, they can use these skills to build their own game.</div>
              {SKILLS.map(sk=>{
                const pts=skills[sk.id]||0;
                if(pts===0)return null;
                const mx=Math.max(totSk,1);
                const pct=Math.min(100,(pts/mx)*200);
                return (
                  <div key={sk.id} style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:600,marginBottom:2}}>
                      <span>{sk.emoji} {sk.name}</span><span style={{opacity:0.3}}>{pts.toLocaleString()}</span>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.08)",borderRadius:5,height:10,overflow:"hidden"}}>
                      <div style={{width:`${pct}%`,height:"100%",background:sk.color,borderRadius:4,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* GUIDED BUILD MODE PREVIEW */}
            <div style={{background:"rgba(59,155,246,0.06)",borderRadius:16,padding:14,margin:"8px 0",border:"1px solid rgba(59,155,246,0.12)",textAlign:"left"}}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Next step: <span style={{color:"#E8958A"}}>Guided Build Mode</span></div>
              <div style={{fontSize:14,opacity:0.4,marginBottom:12}}>{nm} just proved they can do more than play — now help them build something of their own.</div>
              <div style={{display:"flex",gap:3,alignItems:"center",justifyContent:"center",flexWrap:"wrap",marginBottom:10,padding:"8px",background:"rgba(0,0,0,0.2)",borderRadius:10}}>
                {[{s:"💡",l:"Pick idea"},{s:"💬",l:"Describe it"},{s:"🤖",l:"AI builds"},{s:"🎮",l:"Play it"},{s:"📁",l:"Save it"}].map((x,i)=>(
                  <React.Fragment key={i}>
                    <div style={{textAlign:"center",padding:"0 3px"}}><div style={{fontSize:16}}>{x.s}</div><div style={{fontSize:8,opacity:0.4,fontWeight:600}}>{x.l}</div></div>
                    {i<4&&<div style={{fontSize:8,opacity:0.15}}>→</div>}
                  </React.Fragment>
                ))}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[{t:"Animal Quiz",w:"Lily, 7",e:"🐾"},{t:"Space Challenge",w:"Marcus, 10",e:"🚀"},{t:"History Blast",w:"Ava, 12",e:"📚"}].map((ex,i)=>(
                  <div key={i} style={{flex:"1 1 120px",background:"rgba(0,0,0,0.2)",borderRadius:14,padding:"12px 8px",border:"1px solid rgba(255,255,255,0.04)",textAlign:"center"}}>
                    <div style={{fontSize:24}}>{ex.e}</div>
                    <div style={{fontSize:14,fontWeight:700}}>{ex.t}</div>
                    <div style={{fontSize:11,opacity:0.3}}>{ex.w}</div>
                  </div>
                ))}
              </div>
            </div>

            <button className="cb" onClick={()=>setPostStep(1)} style={BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)")}>
              Email Me the Report + Unlock First Build
            </button>
            <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:8}}>
              <button className="cb" onClick={reset} style={{background:"rgba(255,255,255,0.06)",color:"#fff",padding:"10px 18px",borderRadius:50,fontSize:12,fontWeight:600,fontFamily:"inherit",border:"none",cursor:"pointer"}}>Play Again</button>
              <button className="cb" onClick={()=>setScr("leaderboard")} style={{background:"rgba(255,255,255,0.06)",color:"#fff",padding:"10px 18px",borderRadius:50,fontSize:12,fontWeight:600,fontFamily:"inherit",border:"none",cursor:"pointer"}}>Leaderboard</button>
            </div>
          </div>
        )}

        {/* EMAIL CAPTURE */}
        {scr==="gameEnd"&&postStep===1&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:580,width:"100%"}}>
            <div style={{fontSize:32,marginBottom:4}}>📊</div>
            <h2 style={{fontSize:20,fontWeight:800,margin:"0 0 6px"}}>Save {nm}'s baseline + unlock Guided Build Mode</h2>
            <p style={{fontSize:13,opacity:0.4,lineHeight:1.5,marginBottom:8}}>We'll email you today's report, save progress over time, and unlock {nm}'s first project.</p>
            <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
              {[{i:"📊",t:"Today's baseline"},{i:"📈",t:"Progress updates"},{i:"📁",t:"Project portfolio"}].map((t,i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"6px 10px",border:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:12}}>{t.i}</span><span style={{fontSize:10,opacity:0.4}}>{t.t}</span>
                </div>
              ))}
            </div>
            <div style={{maxWidth:320,margin:"0 auto",marginBottom:10}}>
              <input type="email" placeholder="Parent's email address" value={parentEmail} onChange={e=>setParentEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&parentEmail.includes("@"))setPostStep(2);}} style={{background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"13px 16px",color:"#fff",fontSize:15,fontFamily:"inherit",width:"100%",boxSizing:"border-box",outline:"none",marginBottom:8}} />
              <button className="cb" onClick={()=>{if(parentEmail.includes("@"))setPostStep(2);}} style={{...BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)"),width:"100%",fontSize:15}}>
                Email Me the Report + Unlock First Build
              </button>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:6}}>
              {[{i:"🔒",t:"No spam"},{i:"🛡️",t:"Safe & ad-free"},{i:"👁️",t:"Parent-controlled"}].map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:10}}>{t.i}</span><span style={{fontSize:10,opacity:0.2}}>{t.t}</span></div>
              ))}
            </div>
            <div style={{fontSize:9,opacity:0.15,marginBottom:8}}>For kids under 13, parents stay in control of the account.</div>
            <button onClick={()=>setPostStep(0)} style={{background:"none",border:"none",color:"#fff",opacity:0.15,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>
          </div>
        )}

        {/* TRIAL CTA */}
        {scr==="gameEnd"&&postStep===2&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:600,width:"100%"}}>
            <div style={{fontSize:32,marginBottom:4}}>🎨</div>
            <h2 style={{fontSize:20,fontWeight:800,margin:"0 0 4px"}}>From player to creator</h2>
            <p style={{fontSize:13,opacity:0.4,lineHeight:1.5,marginBottom:6}}>{nm} can build their first project in about 15 minutes with guided AI support.</p>
            <div style={{background:"rgba(232,149,138,0.06)",borderRadius:12,padding:"8px 12px",border:"1px solid rgba(232,149,138,0.1)",marginBottom:12,fontSize:11,opacity:0.5,lineHeight:1.5}}>
              {age<=8
                ?"Every project "+nm+" builds becomes part of their collection — games they made that they can proudly show family and teachers."
                :"Every project "+nm+" builds becomes part of their WildCoders portfolio — a growing record of creativity, logic, and digital fluency."
              }
            </div>
            <div style={{fontSize:11,fontWeight:700,opacity:0.3,letterSpacing:1,marginBottom:8}}>PICK YOUR FIRST BUILD</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              {[{e:"🐾",t:"Animal Quiz",d:"Great for younger builders",c:"#E8958A",ages:"5-7",project:"animal-quiz"},
                {e:"🚀",t:"Space Challenge",d:"Best for creative kids",c:"#3b9bf6",ages:"8-10",project:"space-challenge"},
                {e:"📚",t:"History Blast",d:"Best for older builders",c:"#4ade80",ages:"11-13",project:"history-blast"}].map((b,i)=>{
                const isDef=(age<=7&&i===0)||(age>=8&&age<=10&&i===1)||(age>=11&&i===2);
                return (
                  <div key={i} onClick={()=>window.location.href="build.html?project="+b.project+"&name="+encodeURIComponent(nm)} style={{flex:"1 1 140px",background:isDef?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",borderRadius:16,padding:"18px 12px",border:isDef?`2px solid ${b.c}`:"2px solid rgba(255,255,255,0.05)",position:"relative",cursor:"pointer",transition:"transform 0.15s,box-shadow 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.3)"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow=""}}>
                    {isDef&&<div style={{position:"absolute",top:-7,left:"50%",transform:"translateX(-50%)",background:b.c,color:"#000",fontSize:7,fontWeight:800,padding:"1px 6px",borderRadius:6}}>RECOMMENDED</div>}
                    <div style={{fontSize:24,fontFamily:'"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif'}}>{b.e}</div>
                    <div style={{fontSize:16,fontWeight:700}}>{b.t}</div>
                    <div style={{fontSize:10,opacity:0.3}}>{b.d}</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"rgba(59,155,246,0.06)",borderRadius:16,padding:"14px",border:"1px solid rgba(59,155,246,0.1)",marginBottom:10}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Guided Build Mode</div>
              <div style={{fontSize:12,opacity:0.4,marginBottom:8}}>Create your first game with a guided AI tutor.</div>
              <button className="cb" onClick={()=>window.location.href="build.html?project="+(age<=7?"animal-quiz":age<=10?"space-challenge":"history-blast")+"&name="+encodeURIComponent(nm)} style={{...BS("linear-gradient(135deg,#E8958A,#D4726A)","0 4px 14px rgba(232,149,138,0.3)"),width:"100%",fontSize:15}}>Start Free Trial — No Credit Card</button>
              <div style={{fontSize:10,opacity:0.2,marginTop:4}}>7 days free. Cancel anytime.</div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginBottom:10,fontSize:11,opacity:0.25}}>
              <span style={{opacity:0.5}}>Play</span><span>→</span><span style={{color:"#E8958A",fontWeight:700}}>Build</span><span>→</span><span>Save</span><span>→</span><span>Share</span><span>→</span><span>Improve</span>
            </div>
            <button onClick={()=>setPostStep(0)} style={{background:"none",border:"none",color:"#fff",opacity:0.15,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Maybe later — back to results</button>
          </div>
        )}

        {/* LEADERBOARD */}
        {scr==="leaderboard"&&(
          <div style={{textAlign:"center",zIndex:1,animation:"bi 0.5s ease",maxWidth:580,width:"100%"}}>
            <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 14px"}}>Leaderboard</h2>
            {hiScores.length===0&&<p style={{opacity:0.3,fontSize:13}}>No scores yet. Be the first!</p>}
            {hiScores.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,background:i===0?"rgba(255,215,0,0.1)":"rgba(255,255,255,0.04)",borderRadius:14,padding:"10px 14px",marginBottom:5,border:i===0?"2px solid rgba(255,215,0,0.3)":"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{fontSize:18,fontWeight:800,color:i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#fff",minWidth:28,opacity:i<3?1:0.4}}>{i===0?"👑":i+1}</div>
              <div style={{flex:1,textAlign:"left"}}><div style={{fontSize:14,fontWeight:700}}>{s.name} <span style={{fontSize:10,opacity:0.3}}>age {s.age}</span></div></div>
              <div style={{fontSize:16,fontWeight:800,color:"#ffd700"}}>{s.score.toLocaleString()}</div>
            </div>))}
            <button className="cb" onClick={reset} style={{...BS("linear-gradient(135deg,#ff6b35,#ff3366)","0 3px 10px rgba(255,51,102,0.25)"),marginTop:10}}>New Expedition</button>
          </div>
        )}

      </div>
    </div>
  );
}



function App() {
  return (
    <div>
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:200,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>{window.location.href="/";}}>
          <img src={WC_LOGO} alt="WildCoders" style={{width:36,height:22}} />
          <span style={{fontSize:15,fontWeight:700,opacity:0.7}}>WildCoders</span>
        </div>
        <div style={{fontSize:11,opacity:0.25}}>Wilderness Quest</div>
      </div>
      <div style={{paddingTop:48}}>
        <Game />
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
